<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Indicadores de Transporte</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Babel (Para transpilar JSX en el navegador) -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F1F5F9;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LineChart, Line, ComposedChart } from 'https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0';

        // --- ÍCONOS SVG INTEGRADOS ---
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const TrendingUp = (p) => <Icon {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Bus = (p) => <Icon {...p}><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></Icon>;
        const Calendar = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
        const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
        const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
        const UploadCloud = (p) => <Icon {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></Icon>;
        const FileSpreadsheet = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
        const MapIcon = (p) => <Icon {...p}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;
        const Bot = (p) => <Icon {...p}><rect width="18" height="10" x="3" y="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" x2="8" y1="16" y2="16"/><line x1="16" x2="16" y1="16" y2="16"/></Icon>;
        const Loader2 = (p) => <Icon {...p} className={`animate-spin ${p.className || ''}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const BarChart2 = (p) => <Icon {...p}><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;

        // --- LÓGICA DE LA APLICACIÓN ---
        
        const apiKey = ""; 

        // Paleta corporativa
        const EXTENDED_PALETTE = [
            '#2A4B54', '#279A55', '#9BB7D4', '#8A7E9A', '#6D213C', '#FDF1B8',
            '#3D5A80', '#D4D5D8', '#145C33', '#6B8EAD', '#496F5D', 
            '#0891b2', '#059669', '#0284c7', '#A39C97', '#64748b', 
            '#475569', '#38bdf8', '#596C68', '#88A08A', '#745943', '#94a3b8'
        ];

        const getYearColor = (year, idx) => {
            const num = parseInt(year, 10);
            if (!isNaN(num)) return EXTENDED_PALETTE[num % EXTENDED_PALETTE.length];
            return EXTENDED_PALETTE[idx % EXTENDED_PALETTE.length];
        };

        const DAY_COLORS = { 'HAB': '#2A4B54', 'SAB': '#9BB7D4', 'DOM': '#3D5A80' };
        const INDICATOR_COLORS = { ali: '#279A55', troncal: '#2A4B54', articulado: '#2A4B54', padron: '#9BB7D4', buseton: '#A2E4B8', tpc: '#6B8EAD', general: '#3D5A80' };
        const MONTHS_ORDER = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

        const parseCSVLine = (text, sep) => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === sep && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result;
        };

        const formatMarkdown = (text) => {
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <br key={i} />;
                const formattedLine = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                return <p key={i} dangerouslySetInnerHTML={{ __html: formattedLine }} className="mb-2 text-slate-700 leading-relaxed" />;
            });
        };

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const [uploadError, setUploadError] = useState('');
            
            const [selectedYears, setSelectedYears] = useState([]);
            const [selectedDayType, setSelectedDayType] = useState('Todos');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showYearDropdown, setShowYearDropdown] = useState(false);
            
            const [logoError, setLogoError] = useState(false);

            const [aiInsight, setAiInsight] = useState('');
            const [isGeneratingAI, setIsGeneratingAI] = useState(false);
            const [aiError, setAiError] = useState('');

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                e.target.value = null;
                setUploadError('');

                if (file.name.toLowerCase().endsWith('.xlsx') || file.name.toLowerCase().endsWith('.xls')) {
                    setUploadError("❌ Subiste un archivo Excel binario. Por favor, abre tu archivo en Excel, ve a 'Archivo' > 'Guardar como' y elige 'CSV (delimitado por comas)'.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const text = evt.target.result;
                        if (text.indexOf('\u0000') !== -1) {
                            setUploadError("❌ El archivo contiene caracteres ilegibles o formato binario. Asegúrate de guardarlo estrictamente como texto plano CSV.");
                            return;
                        }

                        const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                        if (lines.length < 2) {
                            setUploadError("❌ El archivo parece estar vacío o no tiene suficientes filas de datos.");
                            return;
                        }

                        const separator = lines[0].includes(';') ? ';' : ',';
                        const headersRaw = parseCSVLine(lines[0], separator);
                        const headers = headersRaw.map(h => h.toUpperCase().trim());
                        
                        const colIdx = {
                            ano: headers.findIndex(h => h === 'YEAR' || h === 'AÑO' || h === 'ANO' || (h.includes('A') && h.includes('O') && h.length <= 5)),
                            mes: headers.findIndex(h => h.includes('MES')),
                            tipoDia2: headers.findIndex(h => h.includes('TIPO DÍA 2') || h.includes('TIPO DIA 2')),
                            tipDia: headers.findIndex(h => h.includes('TIP') && h.includes('DIA')),
                            validaciones: headers.findIndex(h => h.includes('VALIDACION')),
                            ali: headers.findIndex(h => h.includes('%ALI')),
                            troncal: headers.findIndex(h => h.includes('%TRONCAL')),
                            demanda_troncal: headers.findIndex(h => h === 'TRONCAL'),
                            demanda_ali: headers.findIndex(h => h === 'ALIMENTACIÓN' || h === 'ALIMENTACION'),
                            ipb_a: headers.findIndex(h => h === 'IPB_A' || h === 'IPA_A'),
                            ipb_p: headers.findIndex(h => h === 'IPB_P'),
                            ipb_b: headers.findIndex(h => h === 'IPB_B'),
                            ipb_tpc: headers.findIndex(h => h === 'IPB_TPC'),
                            ipb_sist: headers.findIndex(h => h.includes('IPB SIST') || h === 'IPB'),
                            ikb_a: headers.findIndex(h => h === 'IKB_A' || h === 'IKA_A'),
                            ikb_p: headers.findIndex(h => h === 'IKB_P'),
                            ikb_b: headers.findIndex(h => h === 'IKB_B'),
                            ikb_tpc: headers.findIndex(h => h === 'IKB_TPC'),
                            ikb_sist: headers.findIndex(h => { const c = h.replace(/_/g, ' '); return c === 'IKB SIST' || c === 'IKB GENERAL' || c === 'IKB'; }),
                            kms: headers.findIndex(h => { const c = h.replace(/_/g, ' '); return c.includes('KMS EJEC') && !c.includes('ALI') && !c.includes('TRONCAL'); }),
                            kms_ali: headers.findIndex(h => { const clean = h.replace(/[^A-Z0-9]/g, ''); return clean.includes('KMSEJECALI') || clean.includes('KMSALI') || clean.includes('ALITPC'); }),
                            kms_troncal: headers.findIndex(h => { const clean = h.replace(/[^A-Z0-9]/g, ''); return clean.includes('KMSEJECTRONCAL') || clean.includes('KMSTRONCAL'); }),
                            kms_prog: headers.findIndex(h => h.includes('KMS PROG') || h.includes('KMS_PROG')),
                            flota: headers.findIndex(h => h.includes('FLOTA_EJEC') || h.includes('FLOTA EJEC')),
                            cumpl_a: headers.findIndex(h => h.includes('CUMPLDESPACH_A')),
                            cumpl_p: headers.findIndex(h => h.includes('CUMPLDESPACH_P')),
                            cumpl_b: headers.findIndex(h => h.includes('CUMPLDESPACH_B')),
                            cumpl_tpc: headers.findIndex(h => h.includes('CUMPLDESPACH_TPC')),
                            punt_sis: headers.findIndex(h => h.includes('PUNTUALIDAD_SIS')),
                            punt_met: headers.findIndex(h => h.includes('PUNTUALIDAD_MET')),
                            punt_tpc: headers.findIndex(h => h.includes('PUNTUALIDAD_TPC'))
                        };

                        if (colIdx.ano === -1 || colIdx.mes === -1 || colIdx.validaciones === -1) {
                            setUploadError(`❌ Faltan columnas obligatorias. Verifica los encabezados de tu archivo.`);
                            return;
                        }

                        const parsedData = [];
                        for (let i = 1; i < lines.length; i++) {
                            const values = parseCSVLine(lines[i], separator);
                            const anoStr = values[colIdx.ano];
                            const mesStr = values[colIdx.mes];
                            
                            if (!anoStr || !mesStr) continue;

                            const ano = parseInt(anoStr.replace(/[^0-9]/g, ''));
                            const mes = mesStr.toLowerCase().trim();
                            
                            if (isNaN(ano) || !MONTHS_ORDER.includes(mes)) continue;

                            let tipDia = '';
                            if (colIdx.tipoDia2 !== -1 && values[colIdx.tipoDia2]) {
                                const val2 = values[colIdx.tipoDia2].toUpperCase().trim();
                                if (val2 === 'H') tipDia = 'HAB';
                                else if (val2 === 'S') tipDia = 'SAB';
                                else if (val2 === 'D') tipDia = 'DOM';
                            } else if (colIdx.tipDia !== -1 && values[colIdx.tipDia]) {
                                tipDia = values[colIdx.tipDia].toUpperCase().trim();
                                if (tipDia.includes('FES') || tipDia.includes('DOM')) tipDia = 'DOM';
                            }

                            const getNum = (idx) => {
                                if (idx === -1 || !values[idx]) return 0;
                                const val = parseFloat(values[idx].replace(/,/g, ''));
                                return isNaN(val) ? 0 : val;
                            };

                            parsedData.push({
                                Año: ano, mes: mes, Tip_dia: tipDia, Validaciones: getNum(colIdx.validaciones),
                                Demanda_Troncal: getNum(colIdx.demanda_troncal), Demanda_Ali: getNum(colIdx.demanda_ali),
                                '%ALI': getNum(colIdx.ali), '%TRONCAL': getNum(colIdx.troncal),
                                IPB_A: getNum(colIdx.ipb_a), IPB_P: getNum(colIdx.ipb_p), IPB_B: getNum(colIdx.ipb_b), IPB_TPC: getNum(colIdx.ipb_tpc), 'IPB SIST': getNum(colIdx.ipb_sist),
                                IKB_A: getNum(colIdx.ikb_a), IKB_P: getNum(colIdx.ikb_p), IKB_B: getNum(colIdx.ikb_b), IKB_TPC: getNum(colIdx.ikb_tpc), 'IKB SIST': getNum(colIdx.ikb_sist),
                                KMS_EJEC: getNum(colIdx.kms), KMS_ALI: getNum(colIdx.kms_ali), KMS_TRONCAL: getNum(colIdx.kms_troncal), KMS_PROG: getNum(colIdx.kms_prog), FLOTA_EJEC: getNum(colIdx.flota),
                                cumpl_a: getNum(colIdx.cumpl_a), cumpl_p: getNum(colIdx.cumpl_p), cumpl_b: getNum(colIdx.cumpl_b), cumpl_tpc: getNum(colIdx.cumpl_tpc),
                                punt_sis: getNum(colIdx.punt_sis), punt_met: getNum(colIdx.punt_met), punt_tpc: getNum(colIdx.punt_tpc)
                            });
                        }

                        if (parsedData.length === 0) {
                            setUploadError("❌ Se leyó el archivo pero no se encontró información válida.");
                            return;
                        }

                        setRawData(parsedData);
                        setIsLoaded(true);

                        const availableYrs = Array.from(new Set(parsedData.map(d => d.Año.toString()))).sort().reverse();
                        setSelectedYears(availableYrs.slice(0, 2));

                    } catch (err) {
                        console.error(err);
                        setUploadError("❌ Hubo un error procesando el archivo CSV. Revisa el formato de los datos.");
                    }
                };
                reader.readAsText(file);
            };

            const availableYears = Array.from(new Set(rawData.map(d => d.Año.toString()))).sort().reverse();

            const monthlyTotalData = useMemo(() => {
                if (!isLoaded) return [];
                return MONTHS_ORDER.map(month => {
                    const entry = { name: month.charAt(0).toUpperCase() + month.slice(1, 3) };
                    selectedYears.forEach(year => {
                        const matches = rawData.filter(d => d.mes === month && d.Año.toString() === year);
                        const totalVal = matches.reduce((acc, curr) => acc + curr.Validaciones, 0);
                        if (totalVal > 0) entry[year] = totalVal;
                    });
                    return entry;
                }).filter(e => Object.keys(e).length > 1);
            }, [rawData, selectedYears, isLoaded]);

            const { habData, sabData, domData } = useMemo(() => {
                if (!isLoaded) return { habData: [], sabData: [], domData: [] };
                const buildData = (type) => {
                    return MONTHS_ORDER.map(month => {
                        const entry = { name: month.charAt(0).toUpperCase() + month.slice(1, 3) };
                        selectedYears.forEach(year => {
                            const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month && d.Tip_dia === type);
                            if (matches.length > 0) {
                                entry[year] = Math.round(matches.reduce((acc, curr) => acc + curr.Validaciones, 0) / matches.length);
                            }
                        });
                        return entry;
                    }).filter(e => Object.keys(e).length > 1);
                };
                return { habData: buildData('HAB'), sabData: buildData('SAB'), domData: buildData('DOM') };
            }, [rawData, selectedYears, isLoaded]);

            const sistemaTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const monthMatches = rawData.filter(d => d.Año.toString() === year && d.mes === month);
                        const habMatches = monthMatches.filter(d => d.Tip_dia === 'HAB');

                        if (monthMatches.length > 0) {
                            const kmsAliHab = habMatches.length > 0 ? habMatches.reduce((acc, curr) => acc + curr.KMS_ALI, 0) / habMatches.length : 0;
                            const kmsTroncalHab = habMatches.length > 0 ? habMatches.reduce((acc, curr) => acc + curr.KMS_TRONCAL, 0) / habMatches.length : 0;
                            const demTroncalHab = habMatches.length > 0 ? habMatches.reduce((acc, curr) => acc + curr.Demanda_Troncal, 0) / habMatches.length : 0;
                            const demAliHab = habMatches.length > 0 ? habMatches.reduce((acc, curr) => acc + curr.Demanda_Ali, 0) / habMatches.length : 0;

                            if (kmsAliHab > 0 || kmsTroncalHab > 0 || demTroncalHab > 0 || demAliHab > 0) {
                                grouped.push({
                                    label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                    kmsAli: Math.round(kmsAliHab), 
                                    kmsTroncal: Math.round(kmsTroncalHab),
                                    demTroncal: Math.round(demTroncalHab), 
                                    demAli: Math.round(demAliHab)
                                });
                            }
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, isLoaded]);

            const distribucionTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month && (selectedDayType === 'Todos' || d.Tip_dia === selectedDayType));
                        if (matches.length > 0) {
                            const count = matches.length;
                            const avg = (key) => matches.reduce((acc, curr) => acc + curr[key], 0) / count;
                            const rawAli = avg('%ALI');
                            const rawTroncal = avg('%TRONCAL');
                            const aliPct = rawAli > 1.5 ? rawAli : rawAli * 100;
                            const troncalPct = rawTroncal > 1.5 ? rawTroncal : rawTroncal * 100;

                            grouped.push({
                                label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                ali: Number(aliPct.toFixed(2)), troncal: Number(troncalPct.toFixed(2))
                            });
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, selectedDayType, isLoaded]);

            const ofertaTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month && d.Tip_dia === 'HAB');
                        if (matches.length > 0) {
                            const count = matches.length;
                            const avgKms = matches.reduce((acc, curr) => acc + curr.KMS_EJEC, 0) / count;
                            const avgFlota = matches.reduce((acc, curr) => acc + curr.FLOTA_EJEC, 0) / count;
                            if (avgKms > 0 || avgFlota > 0) {
                                grouped.push({
                                    label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                    kms: Math.round(avgKms), flota: Math.round(avgFlota),
                                });
                            }
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, isLoaded]);

            const monthlyTotalsTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month);
                        if (matches.length > 0) {
                            const totalKms = matches.reduce((acc, curr) => acc + curr.KMS_EJEC, 0);
                            const totalKmsProg = matches.reduce((acc, curr) => acc + curr.KMS_PROG, 0);
                            const totalValidaciones = matches.reduce((acc, curr) => acc + curr.Validaciones, 0);
                            if (totalKms > 0 || totalValidaciones > 0) {
                                grouped.push({
                                    label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                    kmsTotal: Math.round(totalKms), kmsProgTotal: Math.round(totalKmsProg), validacionesTotal: Math.round(totalValidaciones)
                                });
                            }
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, isLoaded]);

            const ipbTipologiasTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].filter(year => parseInt(year, 10) >= 2022).sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month && (selectedDayType === 'Todos' || d.Tip_dia === selectedDayType));
                        if (matches.length > 0) {
                            const count = matches.length;
                            const avg = (key) => matches.reduce((acc, curr) => acc + curr[key], 0) / count;
                            grouped.push({
                                label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                ipb_a: Number(avg('IPB_A').toFixed(1)), ipb_p: Number(avg('IPB_P').toFixed(1)),
                                ipb_b: Number(avg('IPB_B').toFixed(1)), ipb_tpc: Number(avg('IPB_TPC').toFixed(1))
                            });
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, selectedDayType, isLoaded]);

            const ipbGeneralTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month && (selectedDayType === 'Todos' || d.Tip_dia === selectedDayType));
                        if (matches.length > 0) {
                            const count = matches.length;
                            const avgSist = matches.reduce((acc, curr) => acc + curr['IPB SIST'], 0) / count;
                            grouped.push({
                                label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                ipb_sist: Number(avgSist.toFixed(1))
                            });
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, selectedDayType, isLoaded]);

            const ikbTipologiasTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].filter(year => parseInt(year, 10) >= 2022).sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month && (selectedDayType === 'Todos' || d.Tip_dia === selectedDayType));
                        if (matches.length > 0) {
                            const count = matches.length;
                            const avg = (key) => matches.reduce((acc, curr) => acc + curr[key], 0) / count;
                            grouped.push({
                                label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                ikb_a: Number(avg('IKB_A').toFixed(1)), ikb_p: Number(avg('IKB_P').toFixed(1)),
                                ikb_b: Number(avg('IKB_B').toFixed(1)), ikb_tpc: Number(avg('IKB_TPC').toFixed(1))
                            });
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, selectedDayType, isLoaded]);

            const ikbGeneralTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month && (selectedDayType === 'Todos' || d.Tip_dia === selectedDayType));
                        if (matches.length > 0) {
                            const count = matches.length;
                            const avgSist = matches.reduce((acc, curr) => acc + curr['IKB SIST'], 0) / count;
                            grouped.push({
                                label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                ikb_sist: Number(avgSist.toFixed(1))
                            });
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, selectedDayType, isLoaded]);

            const ipkTrendData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(year => {
                    MONTHS_ORDER.forEach(month => {
                        const matches = rawData.filter(d => d.Año.toString() === year && d.mes === month);
                        if (matches.length > 0) {
                            const getIpk = (dataArray) => {
                                const totalVal = dataArray.reduce((acc, curr) => acc + curr.Validaciones, 0);
                                const totalKms = dataArray.reduce((acc, curr) => acc + curr.KMS_EJEC, 0);
                                return totalKms > 0 ? (totalVal / totalKms) : null;
                            };

                            const ipkGen = getIpk(matches);
                            const ipkHab = getIpk(matches.filter(d => d.Tip_dia === 'HAB'));
                            const ipkSab = getIpk(matches.filter(d => d.Tip_dia === 'SAB'));
                            const ipkDom = getIpk(matches.filter(d => d.Tip_dia === 'DOM'));

                            if (ipkGen !== null) {
                                grouped.push({
                                    label: `${month.charAt(0).toUpperCase() + month.slice(1, 3)} '${year.slice(2)}`,
                                    general: Number(ipkGen.toFixed(2)), hab: ipkHab !== null ? Number(ipkHab.toFixed(2)) : null,
                                    sab: ipkSab !== null ? Number(ipkSab.toFixed(2)) : null, dom: ipkDom !== null ? Number(ipkDom.toFixed(2)) : null,
                                });
                            }
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, isLoaded]);

            const cumplimientoData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(y => {
                    MONTHS_ORDER.forEach(m => {
                        const matches = rawData.filter(d => d.Año.toString() === y && d.mes === m && (selectedDayType === 'Todos' || d.Tip_dia === selectedDayType));
                        if (matches.length > 0) {
                            const avg = (key) => matches.reduce((acc, curr) => acc + curr[key], 0) / matches.length;
                            grouped.push({
                                label: `${m.slice(0,3)} '${y.slice(-2)}`,
                                articulado: Number(avg('cumpl_a').toFixed(2)),
                                padron: Number(avg('cumpl_p').toFixed(2)),
                                buseton: Number(avg('cumpl_b').toFixed(2)),
                                tpc: Number(avg('cumpl_tpc').toFixed(2))
                            });
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, selectedDayType, isLoaded]);

            const puntualidadData = useMemo(() => {
                if (!isLoaded) return [];
                const grouped = [];
                [...selectedYears].sort().forEach(y => {
                    MONTHS_ORDER.forEach(m => {
                        const yearNum = parseInt(y, 10);
                        const monthIdx = MONTHS_ORDER.indexOf(m);
                        if (yearNum < 2025 || (yearNum === 2025 && monthIdx < 10)) return;

                        const matches = rawData.filter(d => d.Año.toString() === y && d.mes === m && (selectedDayType === 'Todos' || d.Tip_dia === selectedDayType));
                        if (matches.length > 0) {
                            const avg = (key) => matches.reduce((acc, curr) => acc + curr[key], 0) / matches.length;
                            grouped.push({
                                label: `${m.slice(0,3)} '${y.slice(-2)}`,
                                sistur: Number(avg('punt_sis').toFixed(2)),
                                metrocaribe: Number(avg('punt_met').toFixed(2)),
                                tpc: Number(avg('punt_tpc').toFixed(2))
                            });
                        }
                    });
                });
                return grouped;
            }, [rawData, selectedYears, selectedDayType, isLoaded]);

            const tableData = useMemo(() => {
                if (!isLoaded) return [];
                return selectedYears.map(year => {
                    const months = MONTHS_ORDER.map(month => {
                        const getMatches = (type) => rawData.filter(d => d.Año.toString() === year && d.mes === month && d.Tip_dia === type);
                        const habMatches = getMatches('HAB');
                        const sabMatches = getMatches('SAB');
                        const domMatches = getMatches('DOM');

                        const hab = habMatches.length > 0 ? habMatches.reduce((acc, curr) => acc + curr.Validaciones, 0) / habMatches.length : 0;
                        const sab = sabMatches.length > 0 ? sabMatches.reduce((acc, curr) => acc + curr.Validaciones, 0) / sabMatches.length : 0;
                        const dom = domMatches.length > 0 ? domMatches.reduce((acc, curr) => acc + curr.Validaciones, 0) / domMatches.length : 0;

                        return {
                            month, hab: Math.round(hab), sab: Math.round(sab), dom: Math.round(dom),
                            pctSab: hab > 0 ? ((sab / hab) * 100).toFixed(1) : '0', pctDom: hab > 0 ? ((dom / hab) * 100).toFixed(1) : '0'
                        };
                    }).filter(m => m.hab > 0 || m.sab > 0 || m.dom > 0);
                    return { year, months };
                });
            }, [rawData, selectedYears, isLoaded]);

            const generateAIInsight = async () => {
                if (!selectedYears.length) return;
                setIsGeneratingAI(true); setAiError(''); setAiInsight('');

                const aiDataPayload = {
                    añosAnalizados: selectedYears,
                    demandaMensual: monthlyTotalData.slice(-12),
                    eficienciaOfertaDemanda: monthlyTotalsTrendData.slice(-12),
                    tendenciaIPK: ipkTrendData.slice(-12)
                };

                const prompt = `Actúa como un analista experto en planificación de sistemas de transporte público masivo.
                Estoy analizando un tablero de indicadores de demanda y oferta. Aquí tienes un resumen de datos de los últimos periodos evaluados (${selectedYears.join(', ')}):
                ${JSON.stringify(aiDataPayload)}
                Por favor, escribe un "Resumen Ejecutivo" en español evaluando estos datos. Debes ser conciso, profesional y usar datos numéricos para sustentar tu texto.
                Estructura tu respuesta estrictamente en 3 puntos usando este formato:
                **1. Tendencias de Demanda:** (Escribe aquí un párrafo detectando picos o caídas en la demanda total).
                **2. Eficiencia Operativa:** (Escribe aquí un párrafo evaluando si los kilómetros ejecutados se ajustan correctamente a la demanda o si hay brechas con los programados).
                **3. Recomendación Estratégica:** (Propón una medida operativa accionable basada en los datos).`;

                const fetchWithRetry = async (retries = 3, delay = 1000) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        if (data.candidates && data.candidates[0].content) {
                            setAiInsight(data.candidates[0].content.parts[0].text);
                        } else throw new Error("Respuesta inválida del LLM");
                    } catch (error) {
                        if (retries > 0) { await new Promise(res => setTimeout(res, delay)); await fetchWithRetry(retries - 1, delay * 2); } 
                        else setAiError('No se pudo generar el análisis en este momento. Intenta de nuevo más tarde.');
                    }
                };

                await fetchWithRetry();
                setIsGeneratingAI(false);
            };

            const toggleYear = (year) => setSelectedYears(prev => prev.includes(year) ? prev.filter(y => y !== year) : [...prev, year]);
            const formatNumber = (num) => new Intl.NumberFormat('es-CO').format(num);

            if (!isLoaded) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-slate-800">

                            <div className="bg-slate-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                                <FileSpreadsheet size={48} className="text-[#0d1e2b]" />
                            </div>
                            <h1 className="text-3xl font-black mb-3 text-[#0d1e2b]">Cargar Datos de Operación</h1>
                            <p className="text-slate-500 mb-8 text-sm leading-relaxed">
                                Asegúrate de que tu archivo sea formato <strong>CSV (Delimitado por comas)</strong>. Los archivos de Excel (.xlsx) generarán un error en la lectura.
                            </p>
                            <label className="cursor-pointer bg-[#0d1e2b] text-white px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-[#1a3a54] transition-all shadow-lg hover:shadow-xl">
                                <UploadCloud size={24} /> Seleccionar Archivo CSV
                                <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                            </label>
                            {uploadError && (
                                <div className="mt-6 bg-blue-50 text-blue-700 p-4 rounded-xl flex items-start gap-3 text-left border border-blue-100">
                                    <AlertCircle size={20} className="shrink-0 mt-0.5" />
                                    <span className="text-sm font-medium leading-relaxed">{uploadError}</span>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-slate-900 pb-12">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                {/* Se modificó para buscar "logo.png" para evitar errores con espacios en entornos web */}
                                {!logoError ? (
                                    <img 
                                        src="logo.png" 
                                        alt="Transmetro" 
                                        className="h-12 object-contain" 
                                        onError={() => setLogoError(true)} 
                                    />
                                ) : (
                                    <div className="bg-[#0d1e2b] p-2 rounded-lg shadow-md"><Bus className="text-white" size={24} /></div>
                                )}
                                <div className="h-10 w-px bg-slate-200"></div>
                                <div>
                                    <h1 className="text-xl font-black text-[#0d1e2b] tracking-tight">Indicadores de Gestión</h1>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{rawData.length.toLocaleString('es-CO')} registros analizados</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="relative">
                                    <button onClick={() => setShowYearDropdown(!showYearDropdown)} className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50 text-[#0d1e2b]">
                                        <Calendar size={16} /> Años ({selectedYears.length})
                                    </button>
                                    {showYearDropdown && (
                                        <div className="absolute top-full right-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl p-2 z-30 max-h-64 overflow-y-auto">
                                            {availableYears.map(year => (
                                                <button key={year} onClick={() => toggleYear(year)} className="w-full flex items-center justify-between px-3 py-2 hover:bg-slate-50 rounded-lg text-sm font-medium text-slate-700">
                                                    {year} {selectedYears.includes(year) && <Check size={16} className="text-[#0d1e2b]" />}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <select className="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold shadow-sm outline-none text-[#0d1e2b]" value={selectedDayType} onChange={(e) => setSelectedDayType(e.target.value)}>
                                    <option value="Todos">Filtro Indicadores: Todos</option>
                                    <option value="HAB">Hábiles</option>
                                    <option value="SAB">Sábados</option>
                                    <option value="DOM">Dominicales/Festivos</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 mt-8 space-y-8">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div className="flex bg-white p-1 rounded-2xl w-fit shadow-sm border border-slate-200">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === 'dashboard' ? 'bg-[#0d1e2b] text-white' : 'text-slate-500'}`}>Infografía</button>
                                <button onClick={() => setActiveTab('tables')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === 'tables' ? 'bg-[#0d1e2b] text-white' : 'text-slate-500'}`}>Tablas Resumen</button>
                            </div>
                            <button onClick={generateAIInsight} disabled={isGeneratingAI} className={`flex items-center gap-2 px-6 py-2.5 rounded-2xl text-sm font-bold transition-all shadow-md ${isGeneratingAI ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-[#0d1e2b] to-[#2A4B54] text-white hover:shadow-lg hover:scale-[1.02]'}`}>
                                {isGeneratingAI ? <Loader2 size={18} /> : <Sparkles size={18} />}
                                {isGeneratingAI ? 'Generando Reporte IA...' : '✨ Analizar con IA'}
                            </button>
                        </div>

                        {(aiInsight || aiError) && (
                            <div className="bg-gradient-to-br from-slate-50 to-blue-50 p-6 rounded-3xl border border-blue-100 shadow-sm relative overflow-hidden animate-in fade-in slide-in-from-top-4">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-[#0d1e2b] opacity-5 rounded-full blur-3xl -mr-10 -mt-10" />
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="bg-[#0d1e2b] p-2 rounded-xl shadow-sm"><Bot className="text-white" size={24} /></div>
                                    <h3 className="text-xl font-black text-slate-800">Resumen Ejecutivo Inteligente</h3>
                                </div>
                                {aiError ? (
                                    <p className="text-blue-600 font-medium text-sm flex items-center gap-2"><AlertCircle size={16}/> {aiError}</p>
                                ) : (
                                    <div className="text-sm">{formatMarkdown(aiInsight)}</div>
                                )}
                            </div>
                        )}

                        {activeTab === 'dashboard' ? (
                            <div className="grid grid-cols-1 gap-8">
                                
                                <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                    <div className="mb-6 flex flex-col md:flex-row md:items-center justify-between">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Users size={20} className="text-[#0d1e2b]" /> Evolución Mensual de Demanda (Suma Total)</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Suma total de validaciones sin discriminar por tipo de día</p>
                                        </div>
                                    </div>
                                    <div className="h-80">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={monthlyTotalData}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 12, fontWeight: 600}} />
                                                <YAxis axisLine={false} tickLine={false} tickFormatter={(val) => val >= 1000000 ? `${(val/1000000).toFixed(1)}M` : `${(val/1000).toFixed(0)}k`} width={60} />
                                                <Tooltip cursor={{fill: '#f8fafc'}} formatter={(value) => [formatNumber(value), "Validaciones Totales"]} />
                                                <Legend />
                                                {selectedYears.map((year, idx) => (
                                                    <Bar key={year} dataKey={year} fill={getYearColor(year, idx)} radius={[4, 4, 0, 0]} barSize={35} name={year} />
                                                ))}
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                    <div className="mb-6">
                                        <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Calendar size={20} className="text-[#3D5A80]" /> Demanda Promedio Diaria por Tipo de Día</h3>
                                        <p className="text-xs font-medium text-slate-500 ml-7">Comparativa mensual interanual desagregada para cada tipo de día</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <h4 className="text-sm font-bold text-slate-700 mb-4 text-center">Días Hábiles</h4>
                                            <div className="h-60">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={habData} margin={{top: 5, right: 10, left: -20, bottom: 0}}>

                                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                        <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10}} tickFormatter={(val) => val >= 1000 ? `${(val/1000).toFixed(0)}k` : val} />
                                                        <Tooltip formatter={(value) => [formatNumber(value), "Promedio Diario"]} />
                                                        <Legend wrapperStyle={{fontSize: '10px'}} />
                                                        {selectedYears.map((year, idx) => <Line key={year} type="monotone" dataKey={year} name={year} stroke={getYearColor(year, idx)} strokeWidth={2} dot={{r: 3}} connectNulls />)}
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <h4 className="text-sm font-bold text-slate-700 mb-4 text-center">Sábados</h4>
                                            <div className="h-60">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={sabData} margin={{top: 5, right: 10, left: -20, bottom: 0}}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                        <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10}} tickFormatter={(val) => val >= 1000 ? `${(val/1000).toFixed(0)}k` : val} />
                                                        <Tooltip formatter={(value) => [formatNumber(value), "Promedio Diario"]} />
                                                        <Legend wrapperStyle={{fontSize: '10px'}} />
                                                        {selectedYears.map((year, idx) => <Line key={year} type="monotone" dataKey={year} name={year} stroke={getYearColor(year, idx)} strokeWidth={2} dot={{r: 3}} connectNulls />)}
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <h4 className="text-sm font-bold text-slate-700 mb-4 text-center">Domingos y Festivos</h4>
                                            <div className="h-60">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={domData} margin={{top: 5, right: 10, left: -20, bottom: 0}}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                        <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10}} tickFormatter={(val) => val >= 1000 ? `${(val/1000).toFixed(0)}k` : val} />
                                                        <Tooltip formatter={(value) => [formatNumber(value), "Promedio Diario"]} />
                                                        <Legend wrapperStyle={{fontSize: '10px'}} />
                                                        {selectedYears.map((year, idx) => <Line key={year} type="monotone" dataKey={year} name={year} stroke={getYearColor(year, idx)} strokeWidth={2} dot={{r: 3}} connectNulls />)}
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Check size={20} className="text-[#279A55]" /> Cumplimiento de Despachos por Tipología</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Promedio del cumplimiento (%). Aplica filtro superior de Tipo de Día.</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <ComposedChart data={cumplimientoData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis domain={[0, 100]} axisLine={false} tickLine={false} />
                                                    <Tooltip />
                                                    <Legend />
                                                    <Bar dataKey="articulado" name="Articulado" fill="#2A4B54" radius={[4, 4, 0, 0]} barSize={15} />
                                                    <Bar dataKey="padron" name="Padrón" fill="#279A55" radius={[4, 4, 0, 0]} barSize={15} />
                                                    <Bar dataKey="buseton" name="Busetón" fill="#FDF1B8" radius={[4, 4, 0, 0]} barSize={15} />
                                                    <Bar dataKey="tpc" name="TPC" fill="#8A7E9A" radius={[4, 4, 0, 0]} barSize={15} />
                                                </ComposedChart>
