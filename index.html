                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Clock size={20} className="text-[#6D213C]" /> Puntualidad por Concesionario</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Filtrado a partir de Noviembre 2025. Aplica filtro superior de Tipo de Día.</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                {puntualidadData.length > 0 ? (
                                                    <LineChart data={puntualidadData}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                        <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                        <YAxis domain={[0, 100]} axisLine={false} tickLine={false} />
                                                        <Tooltip />
                                                        <Legend />
                                                        <Line type="monotone" dataKey="sistur" name="Sistur" stroke="#2A4B54" strokeWidth={3} dot={false} />
                                                        <Line type="monotone" dataKey="metrocaribe" name="Metrocaribe" stroke="#279A55" strokeWidth={3} dot={false} />
                                                        <Line type="monotone" dataKey="tpc" name="TPC" stroke="#6D213C" strokeWidth={3} dot={false} />
                                                    </LineChart>
                                                ) : (
                                                    <div className="h-full w-full flex items-center justify-center text-slate-400 font-medium text-sm text-center px-4">
                                                        No hay datos disponibles a partir de Noviembre de 2025 para los años seleccionados.
                                                    </div>
                                                )}
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                    <div className="mb-6">
                                        <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><BarChart2 size={20} className="text-[#2A4B54]" /> Histórico Demanda vs Kms por Componente</h3>
                                        <p className="text-xs font-medium text-slate-500 ml-7">Demanda y Kilómetros representados como PROMEDIO DIARIO exclusivo de Días Hábiles, separados por componente.</p>
                                    </div>
                                    <div className="h-80">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={sistemaTrendData} margin={{ top: 5, right: 10, left: 10, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                <YAxis yAxisId="left" axisLine={false} tickLine={false} tickFormatter={(val) => val >= 1000000 ? `${(val/1000000).toFixed(1)}M` : (val >= 1000 ? `${(val/1000).toFixed(0)}k` : val)} />
                                                <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} tickFormatter={(val) => val >= 1000000 ? `${(val/1000000).toFixed(1)}M` : (val >= 1000 ? `${(val/1000).toFixed(0)}k` : val)} />
                                                <Tooltip formatter={(value, name) => [formatNumber(value), name]} />
                                                <Legend />
                                                <Bar yAxisId="left" dataKey="demTroncal" name="Dem. Troncal" fill={INDICATOR_COLORS.troncal} fillOpacity={0.6} radius={[4, 4, 0, 0]} barSize={25} />
                                                <Bar yAxisId="left" dataKey="demAli" name="Dem. Alimentación" fill={INDICATOR_COLORS.ali} fillOpacity={0.6} radius={[4, 4, 0, 0]} barSize={25} />
                                                <Line yAxisId="right" type="monotone" dataKey="kmsTroncal" name="Kms Troncal" stroke={INDICATOR_COLORS.troncal} strokeWidth={3} dot={false} />
                                                <Line yAxisId="right" type="monotone" dataKey="kmsAli" name="Kms Alimentación" stroke={INDICATOR_COLORS.ali} strokeWidth={3} dot={false} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><MapIcon size={20} className="text-[#279A55]" /> Distribución de demanda por componente</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Aplica filtro superior de Tipo de Día</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={distribucionTrendData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis domain={[0, 100]} axisLine={false} tickLine={false} unit="%" />
                                                    <Tooltip formatter={(value) => [`${value}%`]} />
                                                    <Legend />
                                                    <Line type="monotone" dataKey="ali" name="% Alimentación" stroke={INDICATOR_COLORS.ali} strokeWidth={3} dot={false} />
                                                    <Line type="monotone" dataKey="troncal" name="% Troncal" stroke={INDICATOR_COLORS.troncal} strokeWidth={3} dot={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Activity size={20} className="text-[#9BB7D4]" /> Evolución Operativa (Kms vs Flota)</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Promedio diario analizado exclusivamente para Días Hábiles</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={ofertaTrendData} margin={{ top: 5, right: 10, left: 10, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis yAxisId="left" axisLine={false} tickLine={false} tickFormatter={(val) => val >= 1000 ? `${(val/1000).toFixed(0)}k` : val} />
                                                    <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} />
                                                    <Tooltip formatter={(value, name) => [formatNumber(value), name]} />
                                                    <Legend />
                                                    <Line yAxisId="left" type="monotone" dataKey="kms" name="Kilómetros Promedio" stroke="#9BB7D4" strokeWidth={3} dot={false} />
                                                    <Line yAxisId="right" type="monotone" dataKey="flota" name="Flota Promedio" stroke="#2A4B54" strokeWidth={3} strokeDasharray="3 3" dot={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><TrendingUp size={20} className="text-[#3D5A80]" /> Kilómetros programados vs ejecutados y Demanda</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Suma total mensual de cumplimiento operativo y demanda</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={monthlyTotalsTrendData} margin={{ top: 5, right: 10, left: 10, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis yAxisId="left" axisLine={false} tickLine={false} tickFormatter={(val) => val >= 1000000 ? `${(val/1000000).toFixed(1)}M` : (val >= 1000 ? `${(val/1000).toFixed(0)}k` : val)} />
                                                    <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} tickFormatter={(val) => val >= 1000000 ? `${(val/1000000).toFixed(1)}M` : (val >= 1000 ? `${(val/1000).toFixed(0)}k` : val)} />
                                                    <Tooltip formatter={(value, name) => [formatNumber(value), name]} />
                                                    <Legend />
                                                    <Line yAxisId="left" type="monotone" dataKey="kmsProgTotal" name="Kms Programados" stroke="#D4D5D8" strokeWidth={3} dot={false} />
                                                    <Line yAxisId="left" type="monotone" dataKey="kmsTotal" name="Kms Ejecutados" stroke="#9BB7D4" strokeWidth={3} dot={false} />
                                                    <Line yAxisId="right" type="monotone" dataKey="validacionesTotal" name="Demanda Total" stroke="#2A4B54" strokeDasharray="3 3" strokeWidth={3} dot={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><TrendingUp size={20} className="text-[#2A4B54]" /> Tendencia de IPK Promedio (Pasajeros por Km)</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Evolución cronológica general y desagregado por tipo de día operativo</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={ipkTrendData} margin={{ top: 5, right: 10, left: 10, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <Tooltip />
                                                    <Legend />
                                                    <Line type="monotone" dataKey="general" name="IPK Sistémico" stroke="#64748b" strokeWidth={4} dot={false} />
                                                    <Line type="monotone" dataKey="hab" name="Hábiles" stroke={DAY_COLORS.HAB} strokeWidth={2} dot={false} connectNulls />
                                                    <Line type="monotone" dataKey="sab" name="Sábados" stroke={DAY_COLORS.SAB} strokeWidth={2} dot={false} connectNulls />
                                                    <Line type="monotone" dataKey="dom" name="Dom/Festivos" stroke={DAY_COLORS.DOM} strokeWidth={2} dot={false} connectNulls />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><TrendingUp size={20} className="text-[#0369a1]" /> Índice de Pasajeros por Bus (IPB) Tipologías</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Aplica filtro superior. Calculado para años ≥ 2022.</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={ipbTipologiasTrendData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis axisLine={false} tickLine={false} />
                                                    <Tooltip />
                                                    <Legend />
                                                    <Line type="monotone" dataKey="ipb_a" name="Articulado" stroke={INDICATOR_COLORS.articulado} strokeWidth={2} dot={false} />
                                                    <Line type="monotone" dataKey="ipb_p" name="Padrón" stroke={INDICATOR_COLORS.padron} strokeWidth={2} dot={false} />
                                                    <Line type="monotone" dataKey="ipb_b" name="Busetón" stroke={INDICATOR_COLORS.buseton} strokeWidth={2} dot={false} />
                                                    <Line type="monotone" dataKey="ipb_tpc" name="TPC" stroke={INDICATOR_COLORS.tpc} strokeWidth={2} dot={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><TrendingUp size={20} className="text-[#0d1e2b]" /> IPB General del Sistema</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Aplica filtro superior. Incluye todos los años seleccionados.</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={ipbGeneralTrendData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis axisLine={false} tickLine={false} />
                                                    <Tooltip />
                                                    <Legend />
                                                    <Line type="monotone" dataKey="ipb_sist" name="Sist. General" stroke={INDICATOR_COLORS.general} strokeWidth={4} dot={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Activity size={20} className="text-[#0891b2]" /> Índice de Kms por Bus (IKB) Tipologías</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Aplica filtro superior. Calculado para años ≥ 2022.</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={ikbTipologiasTrendData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis axisLine={false} tickLine={false} />
                                                    <Tooltip />
                                                    <Legend />
                                                    <Line type="monotone" dataKey="ikb_a" name="Articulado" stroke={INDICATOR_COLORS.articulado} strokeWidth={2} dot={false} />
                                                    <Line type="monotone" dataKey="ikb_p" name="Padrón" stroke={INDICATOR_COLORS.padron} strokeWidth={2} dot={false} />
                                                    <Line type="monotone" dataKey="ikb_b" name="Busetón" stroke={INDICATOR_COLORS.buseton} strokeWidth={2} dot={false} />
                                                    <Line type="monotone" dataKey="ikb_tpc" name="TPC" stroke={INDICATOR_COLORS.tpc} strokeWidth={2} dot={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="mb-6">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Activity size={20} className="text-[#0d1e2b]" /> IKB General del Sistema</h3>
                                            <p className="text-xs font-medium text-slate-500 ml-7">Aplica filtro superior. Incluye todos los años seleccionados.</p>
                                        </div>
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={ikbGeneralTrendData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{fontSize: 10}} />
                                                    <YAxis axisLine={false} tickLine={false} />
                                                    <Tooltip />
                                                    <Legend />
                                                    <Line type="monotone" dataKey="ikb_sist" name="Sist. General" stroke={INDICATOR_COLORS.general} strokeWidth={4} dot={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-12">
                                {tableData.map(yearGroup => (
                                    <div key={yearGroup.year} className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="px-8 py-6 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                            <h3 className="text-xl font-black text-slate-800 tracking-tight">Resumen Demanda Diaria - Año {yearGroup.year}</h3>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm">
                                                <thead>
                                                    <tr className="bg-white border-b border-slate-100 uppercase text-[10px] font-black text-slate-400 tracking-widest">
                                                        <th className="px-8 py-5">Mes</th>
                                                        <th className="px-6 py-5 border-l border-slate-100">Hábiles (Prom)</th>
                                                        <th className="px-6 py-5">Sábados (Prom)</th>
                                                        <th className="px-6 py-5">Dom/Fest (Prom)</th>
                                                        <th className="px-6 py-5 bg-slate-50/50 text-slate-700 border-l border-slate-100">% Sáb vs Háb</th>
                                                        <th className="px-6 py-5 bg-slate-50/50 text-slate-700">% Dom vs Háb</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {yearGroup.months.map(row => (
                                                        <tr key={row.month} className="hover:bg-slate-50 transition-colors">
                                                            <td className="px-8 py-4 font-bold text-slate-700 capitalize">{row.month}</td>
                                                            <td className="px-6 py-4 font-medium text-slate-600 border-l border-slate-100">{formatNumber(row.hab)}</td>
                                                            <td className="px-6 py-4 font-medium text-slate-600">{formatNumber(row.sab)}</td>
                                                            <td className="px-6 py-4 font-medium text-slate-600">{formatNumber(row.dom)}</td>
                                                            <td className="px-6 py-4 font-black text-slate-600 bg-slate-50/20 border-l border-slate-100">{row.pctSab}%</td>
                                                            <td className="px-6 py-4 font-black text-slate-600 bg-slate-50/20">{row.pctDom}%</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
